<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>接口测试</title>
  <style>
    :root { --bg:#eef2f6; --ink:#12151a; --accent:#0f4c81; --card:#fff; --muted:#6b7280; }
    body { margin:0; font-family:"IBM Plex Serif","Noto Serif SC",serif; background:var(--bg); color:var(--ink); }
    .wrap { max-width: 960px; margin: 32px auto; padding: 16px; }
    .card { background:var(--card); border-radius:12px; padding:16px; box-shadow:0 4px 16px rgba(0,0,0,0.08); margin-top:16px; }
    button { background:var(--accent); color:#fff; border:none; padding:10px 14px; border-radius:8px; cursor:pointer; }
    pre { background:#0b1220; color:#dfe8ff; padding:12px; border-radius:8px; overflow:auto; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    input { padding:8px; border-radius:8px; border:1px solid #cbd5e1; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>接口测试页</h1>

    <div class="card">
      <div class="row">
        <button id="healthBtn">测试 /health</button>
        <button id="ordersBtn">测试 /internal-orders</button>
        <input id="orderId" placeholder="订单ID" />
        <button id="orderDetailBtn">测试 /internal-orders/{id}</button>
        <button id="configCheckBtn">检查配置 /config/self-check</button>
        <button id="seedBtn">生成测试订单</button>
        <button id="syncBtn">拉取领星订单</button>
        <button id="jobBtn">查看导入进度</button>
      </div>
      <div style="margin-top:12px;">
        <div style="font-size:12px;color:#6b7280;">导入进度</div>
        <div style="background:#e5e7eb;border-radius:8px;overflow:hidden;height:10px;">
          <div id="progressBar" style="height:10px;width:0%;background:#0f4c81;"></div>
        </div>
        <div id="progressText" style="margin-top:6px;font-size:12px;color:#374151;"></div>
      </div>
      <pre id="output">等待测试...</pre>
    </div>
  </div>

  <script>
    const out = document.getElementById("output");

    async function showResult(res) {
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
    }

    document.getElementById("healthBtn").addEventListener("click", async () => {
      const res = await fetch("/health");
      await showResult(res);
    });

    document.getElementById("ordersBtn").addEventListener("click", async () => {
      const res = await fetch("/internal-orders");
      await showResult(res);
    });

    document.getElementById("orderDetailBtn").addEventListener("click", async () => {
      const id = document.getElementById("orderId").value;
      if (!id) { out.textContent = "请先输入订单ID"; return; }
      const res = await fetch(`/internal-orders/${id}`);
      await showResult(res);
    });

    document.getElementById("configCheckBtn").addEventListener("click", async () => {
      const res = await fetch("/config/self-check");
      await showResult(res);
    });

    document.getElementById("seedBtn").addEventListener("click", async () => {
      const res = await fetch("/dev/seed", { method: "POST" });
      await showResult(res);
    });

    let lastJobId = null;
    let pollTimer = null;
    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    document.getElementById("syncBtn").addEventListener("click", async () => {
      const res = await fetch("/integrations/lingxing/sync-fbm-orders", { method: "POST" });
      const data = await res.json();
      lastJobId = data.job_id || null;
      out.textContent = JSON.stringify(data, null, 2);
      if (lastJobId) startPolling();
    });

    document.getElementById("jobBtn").addEventListener("click", async () => {
      if (!lastJobId) { out.textContent = "请先拉取领星订单"; return; }
      const res = await fetch(`/import-jobs/${lastJobId}`);
      const data = await res.json();
      out.textContent = JSON.stringify(data, null, 2);
      updateProgress(data);
    });

    function updateProgress(data) {
      const p = data.progress || {};
      const total = p.total || 0;
      const processed = p.processed || 0;
      const percent = total ? Math.min(100, Math.round((processed / total) * 100)) : 0;
      progressBar.style.width = `${percent}%`;
      progressText.textContent = `已处理 ${processed}/${total}，成功 ${p.success || 0}，失败 ${p.failed || 0}`;
      if (data.status === "done" || data.status === "failed") {
        stopPolling();
        if (data.status === "done") {
          progressText.textContent += "，已完成";
        } else {
          progressText.textContent += "，失败";
        }
      }
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(async () => {
        if (!lastJobId) return;
        const res = await fetch(`/import-jobs/${lastJobId}`);
        const data = await res.json();
        updateProgress(data);
      }, 3000);
    }

    function stopPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
    }
  </script>
</body>
</html>
