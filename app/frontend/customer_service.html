<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>客服界面</title>
  <style>
    :root { --bg:#f4f6fb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --ok:#16a34a; --wait:#ef4444; }
    body { margin:0; font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif; background:var(--bg); color:var(--ink); }
    .layout { display:grid; grid-template-columns:72px 1fr; min-height:100vh; }
    .sidebar { background:#111827; color:#cbd5e1; padding:12px 6px; display:flex; flex-direction:column; gap:10px; }
    .side-item { text-align:center; font-size:11px; padding:8px 6px; border-radius:10px; cursor:pointer; }
    .side-item.active { background:#1f2937; color:#fff; }
    .main { display:flex; flex-direction:column; min-width:0; }
    .topbar { background:#0b1220; color:#e5e7eb; padding:8px 16px; }
    .tabs { background:#fff; border-bottom:1px solid var(--line); padding:8px 16px; display:flex; gap:8px; }
    .tab { background:#f1f5f9; color:#111827; padding:6px 10px; border-radius:999px; font-size:12px; cursor:pointer; }
    .tab.active { background:#111827; color:#fff; }
    .toolbar { background:#fff; border-bottom:1px solid var(--line); padding:10px 16px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .toolbar input, .toolbar select, .toolbar button { border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:13px; }
    .toolbar button { background:#2563eb; color:#fff; border-color:#2563eb; cursor:pointer; }
    .content { display:grid; grid-template-columns:360px 1fr; gap:12px; padding:12px; min-height:0; flex:1; }
    .panel { background:#fff; border:1px solid var(--line); border-radius:12px; overflow:auto; min-height:0; }
    .list .row { border-bottom:1px solid var(--line); padding:10px; cursor:pointer; }
    .list .row.active { background:#eef4ff; }
    .meta { font-size:12px; color:var(--muted); }
    .tag { display:inline-block; border-radius:999px; font-size:11px; padding:2px 8px; margin-left:6px; }
    .ok { background:#dcfce7; color:#166534; } .wait { background:#fee2e2; color:#991b1b; }
    .detail { padding:12px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .field { border:1px solid var(--line); border-radius:8px; padding:8px; }
    .field .k { font-size:12px; color:var(--muted); }
    .field .v { font-size:13px; margin-top:4px; white-space:pre-wrap; word-break:break-word; }
    textarea { width:100%; min-height:110px; border:1px solid var(--line); border-radius:10px; padding:10px; font-size:14px; }
    .tools { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .tools button, .tools select { border:1px solid var(--line); border-radius:8px; padding:8px 10px; background:#fff; cursor:pointer; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="side-item" data-go="/ui/dashboard.html">首页</div>
      <div class="side-item" data-go="/ui/internal_orders.html">订单</div>
      <div class="side-item" data-go="/ui/supplier_quote.html">报价</div>
      <div class="side-item" data-go="/ui/kapi_export.html">卡派</div>
      <div class="side-item" data-go="/ui/after_sales.html">售后</div>
      <div class="side-item active" data-go="/ui/customer_service.html">客服</div>
      <div class="side-item" data-go="/ui/suppliers.html">供应商</div>
    </div>
    <div class="main">
      <div class="topbar">终极 ERP · 客服（邮件消息）</div>
      <div class="tabs" id="tabs"></div>
      <div class="toolbar">
        <input id="shopFilter" placeholder="店铺名筛选（可选）" />
        <select id="shopSelect" multiple style="min-width:360px; max-width:460px; height:96px;"></select>
        <select id="flag"><option value="receive">收件</option><option value="sent">发件</option></select>
        <input id="startDate" type="date" />
        <input id="endDate" type="date" />
        <button id="loadBtn">查询邮件</button>
      </div>
      <div class="content">
        <div class="panel list" id="list"></div>
        <div class="panel detail">
          <div id="debug" class="meta" style="padding:8px 12px; border-bottom:1px solid var(--line);">未查询</div>
          <div id="metaGrid" class="grid" style="margin-top:10px;"></div>
          <div style="margin-top:10px;">
            <div class="meta">邮件正文</div>
            <div class="field"><div class="v" id="mailBody">请选择左侧邮件。</div></div>
          </div>
          <div style="margin-top:10px;">
            <div class="meta">快速答复</div>
            <textarea id="replyText" placeholder="输入回复内容"></textarea>
            <div class="tools">
              <select id="tplSelect">
                <option value="">选择模板</option>
                <option value="refund">退款模板</option>
                <option value="replace">补发模板</option>
                <option value="delay">物流延迟模板</option>
              </select>
              <button id="tplBtn">套用模板</button>
              <button id="translateBtn">快速翻译</button>
              <button id="aiBtn">AI 回复</button>
              <button id="doneBtn">标记已回复</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const tabsEl = document.getElementById("tabs");
    function openTab(label, url){const tabs=JSON.parse(localStorage.getItem("tabs")||"[]");if(!tabs.find(t=>t.url===url))tabs.push({label,url});localStorage.setItem("tabs",JSON.stringify(tabs));renderTabs(url);}
    function renderTabs(activeUrl){const tabs=JSON.parse(localStorage.getItem("tabs")||"[]");if(!tabs.length){tabs.push({label:"客服",url:"/ui/customer_service.html"});localStorage.setItem("tabs",JSON.stringify(tabs));}tabsEl.innerHTML="";tabs.forEach(t=>{const el=document.createElement("div");el.className="tab"+(t.url===activeUrl?" active":"");el.textContent=t.label;el.onclick=()=>location.href=t.url;tabsEl.appendChild(el);});}
    document.querySelectorAll(".side-item").forEach(el=>el.onclick=()=>{const url=el.dataset.go;if(!url)return;openTab(el.textContent.trim(),url);location.href=url;});
    renderTabs("/ui/customer_service.html");

    const listEl = document.getElementById("list");
    const debugEl = document.getElementById("debug");
    const shopSelect = document.getElementById("shopSelect");
    const metaGrid = document.getElementById("metaGrid");
    const mailBody = document.getElementById("mailBody");
    const replyText = document.getElementById("replyText");
    let shops = [];
    let rows = [];
    let activeId = "";

    function seedDate() {
      const now = new Date();
      const end = now.toISOString().slice(0,10);
      const start = new Date(now.getTime() - 7*24*3600*1000).toISOString().slice(0,10);
      document.getElementById("startDate").value = start;
      document.getElementById("endDate").value = end;
    }

    async function loadShops() {
      const r = await fetch("/customer-service/shops");
      const o = await r.json().catch(()=>({}));
      if (!r.ok || o.detail) { debugEl.textContent = `店铺加载失败: ${JSON.stringify(o.detail || o)}`; return; }
      shops = o.items || [];
      renderShopOptions();
    }

    function renderShopOptions() {
      const kw = (document.getElementById("shopFilter").value || "").trim().toLowerCase();
      shopSelect.innerHTML = "";
      const filtered = shops.filter(s => !kw || String(s.shop_name || "").toLowerCase().includes(kw));
      filtered.forEach(s => {
        const op = document.createElement("option");
        op.value = String(s.sid);
        op.dataset.email = s.email || "";
        op.textContent = `${s.shop_name || s.sid}${s.email ? ` · ${s.email}` : " · (无邮箱)"}`;
        shopSelect.appendChild(op);
      });
    }

    function renderList() {
      listEl.innerHTML = "";
      if (!rows.length) { listEl.innerHTML = '<div class="row meta">暂无邮件</div>'; return; }
      rows.forEach(r => {
        const div = document.createElement("div");
        div.className = "row" + (String(r.webmail_uuid) === String(activeId) ? " active" : "");
        const st = r.replyStatus === "已回复" ? '<span class="tag ok">已回复</span>' : '<span class="tag wait">待回复</span>';
        div.innerHTML = `<div><strong>${r.subject || "(无标题)"}</strong>${st}</div><div class="meta">${r.date || ""}</div><div class="meta">${r.from_address || ""} → ${r.to_address || ""}</div>`;
        div.onclick = () => { activeId = r.webmail_uuid; renderList(); loadDetail(r); };
        listEl.appendChild(div);
      });
    }

    async function loadDetail(r) {
      const fields = [
        ["状态", r.replyStatus || "-"],
        ["时间", r.date || "-"],
        ["标题", r.subject || "-"],
        ["发件人", `${r.from_name || ""} <${r.from_address || ""}>`],
        ["收件人", `${r.to_name || ""} <${r.to_address || ""}>`],
        ["邮箱", r.email || "-"],
      ];
      metaGrid.innerHTML = fields.map(([k,v]) => `<div class="field"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
      mailBody.textContent = "详情加载中...";
      const res = await fetch("/customer-service/mail/detail", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ webmail_uuid:r.webmail_uuid }) });
      const out = await res.json().catch(()=>({}));
      if (!res.ok || out.detail) { mailBody.textContent = `详情加载失败: ${JSON.stringify(out.detail || out)}`; return; }
      const item = out.item || {};
      mailBody.innerHTML = item.text_html || item.text_plain || "(空)";
    }

    async function loadMail() {
      const selected = Array.from(shopSelect.selectedOptions || []);
      const emails = Array.from(new Set(selected.map(x => String(x.dataset.email || "").trim()).filter(Boolean)));
      if (!emails.length) { alert("请先选择有绑定邮箱的店铺。"); return; }
      const payload = {
        flag: document.getElementById("flag").value,
        emails,
        start_date: document.getElementById("startDate").value,
        end_date: document.getElementById("endDate").value,
        offset: 0,
        length: 100,
      };
      const res = await fetch("/customer-service/mail/list", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify(payload) });
      const out = await res.json().catch(()=>({}));
      if (!res.ok || out.detail) { debugEl.textContent = `查询失败: ${JSON.stringify(out.detail || out)}`; return; }
      rows = out.items || [];
      debugEl.textContent = `已抓取: ${rows.length} / 总数: ${out.total || 0} / 邮箱: ${emails.join(",")}${out.debug && out.debug.length ? ` / 调试: ${JSON.stringify(out.debug).slice(0,280)}` : ""}`;
      activeId = rows[0]?.webmail_uuid || "";
      renderList();
      if (rows[0]) loadDetail(rows[0]);
      else { metaGrid.innerHTML = ""; mailBody.textContent = "暂无邮件"; }
    }

    document.getElementById("shopFilter").addEventListener("input", renderShopOptions);
    document.getElementById("loadBtn").addEventListener("click", loadMail);
    document.getElementById("tplBtn").addEventListener("click", () => {
      const t = document.getElementById("tplSelect").value;
      const map = {
        refund: "Hello, we are sorry for the inconvenience. We can arrange a refund for your order.",
        replace: "Hello, we can arrange a replacement after confirming your shipping address.",
        delay: "Hello, your package is in transit. We are following up with the carrier now."
      };
      if (map[t]) replyText.value = map[t];
    });
    document.getElementById("translateBtn").addEventListener("click", () => { if (replyText.value.trim()) replyText.value = `【翻译】${replyText.value.trim()}`; });
    document.getElementById("aiBtn").addEventListener("click", async () => {
      const txt = String(mailBody.textContent || "").trim();
      const res = await fetch("/customer-service/reply/ai", { method:"POST", headers:{ "Content-Type":"application/json" }, body:JSON.stringify({ text: txt, lang: "en" }) });
      const out = await res.json().catch(()=>({}));
      replyText.value = out.reply || "";
    });
    document.getElementById("doneBtn").addEventListener("click", () => {
      if (!activeId) return;
      const i = rows.findIndex(x => String(x.webmail_uuid) === String(activeId));
      if (i >= 0) rows[i].replyStatus = "已回复";
      renderList();
    });

    seedDate();
    loadShops();
  </script>
</body>
</html>
