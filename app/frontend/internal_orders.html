<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>内部订单中心</title>
  <style>
    :root { --bg:#f4f6fb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --card:#fff; --accent:#2563eb; --dark:#0b1220; }
    body { margin:0; font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif; background:var(--bg); color:var(--ink); }
    .layout { display:grid; grid-template-columns:72px 1fr; min-height:100vh; }
    .sidebar { background:#111827; color:#cbd5e1; padding:12px 6px; display:flex; flex-direction:column; gap:10px; }
    .side-item { text-align:center; font-size:11px; padding:8px 6px; border-radius:10px; cursor:pointer; }
    .side-item.active { background:#1f2937; color:#fff; }
    .main { display:flex; flex-direction:column; min-width:0; }
    .topbar { background:#0b1220; color:#e5e7eb; padding:8px 16px; display:flex; gap:12px; align-items:center; }
    .tabs { background:#fff; border-bottom:1px solid var(--line); padding:8px 16px; display:flex; gap:8px; flex-wrap:wrap; }
    .tab { background:#f1f5f9; color:#111827; padding:6px 10px; border-radius:999px; font-size:12px; cursor:pointer; }
    .tab.active { background:#111827; color:#fff; }
    .content { padding:16px; }
    .title-row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .title-row h1 { margin:0; font-size:22px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:12px; box-shadow:0 8px 20px rgba(15,23,42,0.06); }
    .filters { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:10px; }
    .filters input { padding:8px 10px; border:1px solid var(--line); border-radius:10px; background:#fff; }
    .chip { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; border-radius:999px; padding:6px 10px; font-size:12px; cursor:pointer; }
    .chip.active { background:#111827; color:#fff; border-color:#111827; }
    .chip.tag { background:#f8fafc; color:#0f172a; border-color:#e2e8f0; cursor:default; }
    .btn { background:var(--accent); color:#fff; border:none; padding:8px 12px; border-radius:10px; cursor:pointer; font-size:12px; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:8px; }
    .group-panel { margin-top:12px; }
    .group-header { display:flex; justify-content:space-between; align-items:center; }
    .group-bar { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .group-btn { background:#fff; border:1px solid var(--line); border-radius:999px; padding:6px 10px; font-size:12px; cursor:pointer; }
    .group-btn.active { background:#111827; color:#fff; }
    .group-item { display:flex; align-items:center; gap:4px; }
    .group-mini { border:1px solid var(--line); background:#fff; border-radius:8px; padding:4px 6px; font-size:11px; cursor:pointer; }
    .table { margin-top:12px; background:#fff; border:1px solid var(--line); border-radius:16px; overflow:auto; }
    table { width:100%; border-collapse:separate; border-spacing:0; }
    th, td { padding:10px 12px; border-bottom:1px solid var(--line); text-align:left; font-size:12px; vertical-align:top; white-space:nowrap; }
    th { color:var(--muted); font-weight:600; position:sticky; top:0; background:#f8fafc; z-index:2; }
    .hidden-col { display:none; }
    .img { width:36px; height:36px; border-radius:8px; object-fit:cover; background:#f2f2f7; display:block; }
    .editable { cursor:text; }
    .editable { display:block; min-height:16px; }
    .editable[data-empty="1"] { color:#94a3b8; }
    .inline-input { width:100%; border:1px solid var(--line); border-radius:8px; padding:6px 8px; font-size:12px; }
    .row-toggle { background:#f1f5f9; border:none; border-radius:999px; padding:4px 8px; font-size:11px; cursor:pointer; margin-left:6px; }
    .collapsed .cell-lines span:nth-child(n+2) { display:none; }
    .date-cell { cursor:pointer; color:#2563eb; display:block; min-height:16px; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:50; }
    .modal img { max-width:90vw; max-height:90vh; border-radius:12px; }
    .helper { color:var(--muted); font-size:12px; }
    .chipbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .filter-pop { position:absolute; background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px; box-shadow:0 12px 24px rgba(15,23,42,0.14); display:none; z-index:30; min-width:220px; }
    .filter-pop label { font-size:12px; color:var(--muted); display:block; margin:6px 0 4px; }
    .filter-pop input, .filter-pop select { width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:8px; font-size:12px; }
    .th-inner { display:flex; align-items:center; gap:6px; }
    .sort-ind { font-size:10px; color:#94a3b8; }
    th[data-col="客户地址"], td[data-col="客户地址"] { min-width:220px; max-width:280px; }
    td[data-col="客户地址"] .editable { white-space:pre-line; word-break:break-word; overflow-wrap:anywhere; }
    td[data-col="客户地址"] { white-space:normal; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="side-item" data-go="/ui/dashboard.html">首页</div>
      <div class="side-item active" data-go="/ui/internal_orders.html">订单</div>
      <div class="side-item" data-go="/ui/supplier_quote.html">报价</div>
      <div class="side-item" data-go="/ui/kapi_export.html">卡派</div>
      <div class="side-item" data-go="/ui/after_sales.html">售后</div>
      <div class="side-item" data-go="/ui/customer_service.html">客服</div>
      <div class="side-item" data-go="/ui/suppliers.html">供应商</div>
    </div>
    <div class="main">
      <div class="topbar">终极 ERP · 内部订单中心 <span style="margin-left:8px;color:#94a3b8;font-size:12px;">v20260209-2</span></div>
      <div class="tabs" id="tabs"></div>
      <div class="content">
        <div class="title-row">
          <h1>内部订单中心</h1>
          <div style="display:flex;gap:8px;">
            <button class="btn" id="exportBtn">导出卡派</button>
            <button class="btn" id="downloadBtn" style="background:#0f766e;">下载订单</button>
          </div>
        </div>

        <div class="card" style="margin-top:12px;">
          <div class="filters">
            <input id="kw" placeholder="关键词（订单号/店铺/产品名）" />
            <input id="startDate" placeholder="开始日期 YYYY-MM-DD" />
            <input id="endDate" placeholder="结束日期 YYYY-MM-DD" />
            <div class="chip" id="todayChip">单日订单</div>
            <button class="btn" id="filterBtn">筛选</button>
            <button class="btn" id="clearFilterBtn">取消筛选</button>
            <span class="helper">点击任意“出单日期”自动过滤该日期</span>
          </div>
          <div class="filters" style="margin-top:8px;">
            <select id="viewSelect">
              <option value="">快捷视图</option>
            </select>
            <button class="btn" id="saveViewBtn">保存筛选视图</button>
            <span class="helper" style="margin-left:8px;">订单状态</span>
            <button class="chip" id="statusUnshippedBtn">未发货</button>
            <button class="chip" id="statusPendingBtn">待审核</button>
            <button class="chip" id="statusShippedBtn">已发货</button>
            <button class="chip" id="statusCanceledBtn">已取消</button>
            <button class="chip" id="statusClearBtn">清除状态</button>
            <button class="btn" id="refreshPendingBtn">刷新待审核</button>
            <button class="btn" id="dedupeBtn" style="background:#0f766e;">清理重复订单</button>
          </div>
          <div class="chipbar" id="filterChips"></div>
          <div class="toolbar">
            <button class="btn" id="addRowBtn">新增行</button>
            <button class="btn" id="addColBtn">新增列</button>
            <button class="btn" id="addFormulaBtn">新增公式列</button>
            <button class="btn" id="importTextBtn">粘贴订单文本</button>
            <button class="btn" id="pasteImageBtn">粘贴图片URL</button>
            <button class="btn" id="uploadImageBtn">上传图片</button>
            <input id="uploadImageInput" type="file" accept="image/*" style="display:none;" />
            <button class="btn" id="backfillBtn">补全ASIN/图片</button>
            <button class="btn" id="refreshCodeBtn">刷新产品编码</button>
            <button class="btn" id="pullDetailBtn">拉取订单详情</button>
            <button class="btn" id="enrichAddrBtn">补全买家信息</button>
            <button class="btn" id="kapiSignBtn">同步卡派签收图</button>
            <button class="btn" id="quoteBtn">供应商报价</button>
            <button class="btn" id="batchDeleteBtn" style="background:#dc2626;">批量删除</button>
          </div>
          <div class="group-panel">
            <div class="group-header">
              <div>列分组（可折叠展开）</div>
              <div style="display:flex;gap:8px;">
                <button class="btn" id="addGroupBtn">新增分组</button>
                <button class="btn" id="toggleGroups">收起</button>
              </div>
            </div>
            <div class="group-bar" id="groupBar"></div>
          </div>
        </div>

        <div class="table">
          <table>
            <thead>
              <tr id="headerRow"></tr>
            </thead>
            <tbody id="orderRows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="imgModal">
    <img id="modalImg" src="" alt="preview" />
  </div>
  <div class="modal" id="quoteModal">
    <div class="card" style="min-width:320px;max-width:520px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>选择供应商</strong>
        <button class="btn" id="quoteCloseBtn">关闭</button>
      </div>
      <div id="supplierList" style="margin-top:12px;display:flex;flex-direction:column;gap:8px;"></div>
      <button class="btn" id="quoteSubmitBtn" style="margin-top:12px;">发送报价</button>
    </div>
  </div>
  <div class="modal" id="pasteModal">
    <div class="card" style="min-width:320px;max-width:720px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <strong>粘贴亚马逊订单文本</strong>
        <button class="btn" id="pasteCloseBtn">关闭</button>
      </div>
      <textarea id="pasteTextArea" rows="12" style="width:100%;margin-top:10px;"></textarea>
      <button class="btn" id="pasteSubmitBtn" style="margin-top:10px;">导入</button>
    </div>
  </div>
  <div class="filter-pop" id="colFilterPop">
    <strong id="filterTitle" style="font-size:12px;"></strong>
    <label>筛选类型</label>
    <select id="filterType">
      <option value="text">文本包含</option>
      <option value="number">数值区间</option>
      <option value="date">日期范围</option>
      <option value="status">状态多选</option>
    </select>
    <div id="filterBody"></div>
    <div style="display:flex;gap:6px;margin-top:8px;">
      <button class="btn" id="sortAscBtn">升序</button>
      <button class="btn" id="sortDescBtn">降序</button>
      <button class="btn" id="sortClearBtn">清除排序</button>
    </div>
    <div style="display:flex;gap:6px;margin-top:8px;">
      <button class="btn" id="applyFilterBtn">应用</button>
      <button class="btn" id="clearColFilterBtn">清除</button>
    </div>
  </div>

  <script>
    const rowsEl = document.getElementById("orderRows");
    const exportBtn = document.getElementById("exportBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const headerRow = document.getElementById("headerRow");
    const filterBtn = document.getElementById("filterBtn");
    const todayChip = document.getElementById("todayChip");
    const imgModal = document.getElementById("imgModal");
    const modalImg = document.getElementById("modalImg");
    const quoteBtn = document.getElementById("quoteBtn");
    const pasteModal = document.getElementById("pasteModal");
    const filterChips = document.getElementById("filterChips");
    const colFilterPop = document.getElementById("colFilterPop");
    const filterType = document.getElementById("filterType");
    const filterBody = document.getElementById("filterBody");
    const filterTitle = document.getElementById("filterTitle");
    const viewSelect = document.getElementById("viewSelect");
    let quickStatus = "";
    let autoEnrichRunning = false;
    let lastAutoEnrichAt = 0;
    const autoEnrichTriedAt = new Map();

    const tabsEl = document.getElementById("tabs");
    function openTab(label, url) {
      const tabs = JSON.parse(localStorage.getItem("tabs") || "[]");
      if (!tabs.find(t => t.url === url)) tabs.push({ label, url });
      localStorage.setItem("tabs", JSON.stringify(tabs));
      renderTabs(url);
    }
    function renderTabs(activeUrl) {
      const tabs = JSON.parse(localStorage.getItem("tabs") || "[]");
      if (!tabs.length) {
        tabs.push({ label: "订单", url: "/ui/internal_orders.html" });
        localStorage.setItem("tabs", JSON.stringify(tabs));
      }
      tabsEl.innerHTML = "";
      tabs.forEach(t => {
        const el = document.createElement("div");
        el.className = "tab" + (t.url === activeUrl ? " active" : "");
        el.textContent = t.label;
        el.onclick = () => location.href = t.url;
        tabsEl.appendChild(el);
      });
    }
    document.querySelectorAll(".side-item").forEach(el => {
      el.addEventListener("click", () => {
        const url = el.dataset.go;
        if (!url) return;
        openTab(el.textContent.trim(), url);
        location.href = url;
      });
    });
    renderTabs("/ui/internal_orders.html");

    const templateHeaders = [
      "序列","出单日期","产品图","厘米","英寸","区域","工厂内部型号","包装/尾程方式","货款已付","店铺","订单编号","内部订单号","产品名","供应商","采购数量","单价","总价","1688运输单号","下单日期","供应商出货日期","到花街日期","开船日期","到港日期","单号","头程","尾程","套数","每箱套数","总箱数","货代箱规","计费重量","花街单价","头程运费总价","包材费","出库费","国内运费","其他","每套运费成本","毛重小于68kg","长cm","宽cm","高cm","长in\n＜80","宽in","高in","镑重量\n＜150lb","自算计费重","客户地址","联邦方式","联邦单号","联邦美金","反弹","反弹退回","购买配送","联邦人民币","总成本","回款","利润","售价","被退款","索赔额","SKU","发货日","送达日","卡派后台单号","oversize 130及165","周长＜419","出货图","POD","签收图","其他","快递/卡派账单月份"
    ];
    const keyCount = {};
    const baseColumns = templateHeaders.map((label) => {
      const base = label.trim();
      keyCount[base] = (keyCount[base] || 0) + 1;
      const key = keyCount[base] > 1 ? `${base}__${keyCount[base]}` : base;
      return { key, label: base, dataKey: base };
    });

    const baseGroups = [];
    let customGroups = JSON.parse(localStorage.getItem("customGroups") || "[]");
    function allGroups() { return baseGroups.concat(customGroups); }
    let activeGroupKey = localStorage.getItem("activeGroupKey") || "";

    const customColumns = JSON.parse(localStorage.getItem("customColumns") || "[]");
    const formulaColumns = JSON.parse(localStorage.getItem("formulaColumns") || "[]");
    const pageParams = new URLSearchParams(location.search);
    let focusIds = (pageParams.get("ids") || "").split(",").map(x => x.trim()).filter(Boolean).map(x => Number(x)).filter(x => !Number.isNaN(x));
    let activeSort = JSON.parse(localStorage.getItem("activeSort") || "null");
    const colFilters = JSON.parse(localStorage.getItem("colFilters") || "{}");
    const savedViews = JSON.parse(localStorage.getItem("savedViews") || "[]");
    let lastItems = [];
    let lastFilteredItems = [];
    const columnTypes = {
      "出单日期": "date",
      "下单日期": "date",
      "供应商出货日期": "date",
      "到花街日期": "date",
      "开船日期": "date",
      "到港日期": "date",
      "发货日": "date",
      "送达日": "date",
      "快递/卡派账单月份": "date",
      "单价": "number",
      "总价": "number",
      "采购数量": "number",
      "计费重量": "number",
      "镑重量\n＜150lb": "number",
      "长cm": "number",
      "宽cm": "number",
      "高cm": "number",
      "长in\n＜80": "number",
      "宽in": "number",
      "高in": "number",
    };

    function allColumns() {
      return [{ key: "select", label: "选择" }].concat(baseColumns, customColumns, formulaColumns);
    }

    function dataColumns() {
      return allColumns().slice(1);
    }

    function colIndexToLabel(idx) {
      let n = Number(idx) + 1;
      let out = "";
      while (n > 0) {
        const rem = (n - 1) % 26;
        out = String.fromCharCode(65 + rem) + out;
        n = Math.floor((n - 1) / 26);
      }
      return out;
    }

    function colRefToIndex(ref) {
      const s = String(ref || "").trim().toUpperCase();
      if (!s) return -1;
      if (/^\d+$/.test(s)) {
        const n = Number(s) - 1;
        return n >= 0 ? n : -1;
      }
      if (!/^[A-Z]+$/.test(s)) return -1;
      let val = 0;
      for (const ch of s) val = val * 26 + (ch.charCodeAt(0) - 64);
      return val - 1;
    }

    function resolveColumnKeys(raw) {
      const cols = dataColumns();
      const tokens = String(raw || "").split(",").map(x => x.trim()).filter(Boolean);
      const out = [];
      tokens.forEach((t) => {
        const idx = colRefToIndex(t);
        if (idx >= 0 && idx < cols.length) {
          out.push(cols[idx].key);
          return;
        }
        const hit = cols.find(c => c.label === t || c.key === t);
        if (hit) out.push(hit.key);
      });
      return Array.from(new Set(out));
    }

    function buildHeader() {
      headerRow.innerHTML = "";
      const cols = allColumns();
      cols.forEach((col, i) => {
        const th = document.createElement("th");
        if (col.key === "select") {
          th.innerHTML = `<input type="checkbox" id="selectAll" />`;
        } else {
          const wrap = document.createElement("div");
          wrap.className = "th-inner";
          const colNo = document.createElement("span");
          colNo.className = "sort-ind";
          colNo.textContent = colIndexToLabel(i - 1);
          const label = document.createElement("span");
          label.textContent = col.label;
          label.style.cursor = "pointer";
          label.addEventListener("click", (e) => {
            e.stopPropagation();
            openColFilter(col, th);
          });
          const sort = document.createElement("span");
          sort.className = "sort-ind";
          if (activeSort && activeSort.key === col.key) {
            sort.textContent = activeSort.dir === "asc" ? "▲" : "▼";
          } else {
            sort.textContent = "";
          }
          wrap.appendChild(colNo);
          wrap.appendChild(label);
          wrap.appendChild(sort);
          th.appendChild(wrap);
        }
        th.dataset.col = col.key;
        headerRow.appendChild(th);
      });
      const thOp = document.createElement("th");
      thOp.textContent = "操作";
      headerRow.appendChild(thOp);
    }

    function getValue(order, col) {
      function isEmptyLike(v) {
        if (v === null || v === undefined) return true;
        const s = String(v).trim();
        if (!s) return true;
        const low = s.toLowerCase();
        if (low === "none" || low === "null" || low === "nan") return true;
        const parts = low.replace(/[,]/g, " ").split(/\s+/).filter(Boolean);
        return parts.length > 0 && parts.every(p => p === "none" || p === "null" || p === "nan");
      }
      const dataKey = col.dataKey || col.key;
      function mapShop(v) {
        const m = {
          "NAIROLET-US": "亚丰源",
          "煌明科技-US": "煌明",
          "简丽欧-US": "简丽欧",
          "晨阳铺货A-US": "晨阳",
          "TIZAZO-US": "口福轩",
          "Kadaligh-US": "维利安",
          "口服轩-CA": "口福轩",
          "爱瑞柔-US": "爱瑞柔",
          "路蔻尔-US": "路蔻尔",
          "聚乐-US": "聚乐",
          "译文-US": "译文",
        };
        return m[String(v || "").trim()] || v || "";
      }
      function toYmd(v) {
        const s = String(v || "").trim();
        if (!s) return "";
        if (s.length >= 10 && s[4] === "-" && s[7] === "-") return s.slice(0, 10);
        return s;
      }
      function parseDate(v) {
        const s = String(v || "").trim().replace("T", " ");
        if (!s) return null;
        const m = s.match(/(\d{4})-(\d{2})-(\d{2})/);
        if (!m) return null;
        const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
        return Number.isNaN(d.getTime()) ? null : d;
      }
      function toCnDate(v) {
        const d = parseDate(v);
        if (!d) return String(v || "");
        const week = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"][d.getDay()];
        const jan = new Date(d.getFullYear(), 0, 1);
        const jul = new Date(d.getFullYear(), 6, 1);
        const stdOffset = Math.max(jan.getTimezoneOffset(), jul.getTimezoneOffset());
        const tz = d.getTimezoneOffset() < stdOffset ? "PDT" : "PST";
        return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日${week} ${tz}`;
      }
      function toCnRange(v) {
        const s = String(v || "").trim();
        if (!s) return "";
        if (s.includes(" 到 ")) {
          const p = s.split(" 到 ");
          return `${toCnDate(p[0])} 到 ${toCnDate(p[1])}`;
        }
        if (s.includes(" - ")) {
          const p = s.split(" - ");
          return `${toCnDate(p[0])} 到 ${toCnDate(p[1])}`;
        }
        const found = s.match(/\d{4}-\d{2}-\d{2}(?:\s+\d{2}:\d{2}:\d{2})?/g) || [];
        if (found.length >= 2) return `${toCnDate(found[0])} 到 ${toCnDate(found[1])}`;
        if (found.length === 1) return toCnDate(found[0]);
        return s;
      }
      if (dataKey in order) {
        const val = order[dataKey];
        if (!isEmptyLike(val)) {
          if (dataKey === "单价" && ["0", "0.0", "0.00", 0].includes(val)) return "";
          if (dataKey === "出单日期") return toYmd(val);
          if (dataKey === "发货日") return toCnDate(val);
          if (dataKey === "送达日") return toCnRange(val);
          return dataKey === "店铺" ? mapShop(val) : val;
        }
      }
      if (dataKey === "订单编号" && order.platform_order_no) return order.platform_order_no;
      if (dataKey === "内部订单号" && order.internal_order_no) return order.internal_order_no;
      if (dataKey === "店铺" && order.shop_name) return mapShop(order.shop_name);
      if (dataKey === "订单状态" && order.order_status) return order.order_status;
      if (dataKey === "单号" && order.tracking_no) return order.tracking_no;
      if (dataKey === "出单日期" && order.purchase_time) return toYmd(order.purchase_time);
      const ext = order.ext || {};
      const v = ext[dataKey];
      if (isEmptyLike(v)) return "";
      if (dataKey === "单价" && ["0", "0.0", "0.00", 0].includes(v)) return "";
      if (dataKey === "出单日期") return toYmd(v);
      if (dataKey === "发货日") return toCnDate(v);
      if (dataKey === "送达日") return toCnRange(v);
      if (dataKey === "店铺") return mapShop(v);
      return v;
    }

    function evaluateFormula(expr, order) {
      try {
        const ctxRaw = {};
        const cols = dataColumns();
        cols.forEach((c, idx) => {
          const val = Number(getValue(order, { key: c.key })) || 0;
          const letter = colIndexToLabel(idx);
          ctxRaw[letter] = val;
          ctxRaw[c.key] = val;
          if (c.dataKey) ctxRaw[c.dataKey] = val;
          ctxRaw[`COL${idx + 1}`] = val;
        });
        const ctx = new Proxy(ctxRaw, { get: (obj, k) => obj[k] ?? 0 });
        // eslint-disable-next-line no-new-func
        const fn = new Function("ctx", `with(ctx){ return ${expr}; }`);
        return fn(ctx);
      } catch (e) {
        return "";
      }
    }

    function renderCell(order, col, orderId) {
      function zoomImageUrl(url) {
        if (!url) return "";

        return wrap;

      if (col.type === "formula") {

        span.textContent = evaluateFormula(col.expr || "", order);
        return span;
      }
      const span = document.createElement("span");

      const val = getValue(order, col);
      if (val === "") {

          span.innerHTML = String(val).replace(/\n/g, "<br>");
        } else {

        }
      }
      return span;
    }

    function applyFilters(items) {
      function extractYmd(v) {
        const s = String(v || "").trim();
        if (!s) return "";
        if (s.length >= 10 && s[4] === "-" && s[7] === "-") return s.slice(0, 10);
        const m = s.match(/(20\d{2})年(\d{1,2})月(\d{1,2})日/);
        if (!m) return "";
        return `${m[1]}-${String(Number(m[2])).padStart(2, "0")}-${String(Number(m[3])).padStart(2, "0")}`;
      }
      const kw = (document.getElementById("kw").value || "").toLowerCase();
      const start = document.getElementById("startDate").value;
      const end = document.getElementById("endDate").value;
      return items.filter(o => {
        const ext = o.ext || {};
        const target = `${ext["内部订单号"] || o.internal_order_no || ""} ${ext["订单编号"] || o.platform_order_no || ""} ${ext["店铺"] || o.shop_name || ""} ${ext["产品名"] || ext["product_name"] || ""}`.toLowerCase();
        if (kw && !target.includes(kw)) return false;
        if (start && (o.purchase_time || "").slice(0,10) < start) return false;
        if (end && (o.purchase_time || "").slice(0,10) > end) return false;
        for (const [key, f] of Object.entries(colFilters)) {
          const val = String(getValue(o, { key }) || "");
          if (f.type === "text" && f.value) {
            if (!val.toLowerCase().includes(String(f.value).toLowerCase())) return false;
          }
          if (f.type === "number") {
            const num = Number(val);
            if (f.min !== "" && !Number.isNaN(Number(f.min)) && num < Number(f.min)) return false;
            if (f.max !== "" && !Number.isNaN(Number(f.max)) && num > Number(f.max)) return false;
          }
          if (f.type === "date") {
            const date = extractYmd(val);
            if (f.start && date < f.start) return false;
            if (f.end && date > f.end) return false;
          }
          if (f.type === "status") {
            if (f.values && f.values.length) {
              const wantsEmpty = f.values.includes("(空)");
              if (val === "" && wantsEmpty) return true;
              if (!f.values.includes(val)) return false;
            }
          }
        }
        return true;
      });
    }

    function applySorting(items) {
      if (!activeSort) return items;
      const { key, dir } = activeSort;
      return items.slice().sort((a, b) => {
        const av = getValue(a, { key });
        const bv = getValue(b, { key });
        if (av === bv) return 0;
        if (dir === "asc") return String(av).localeCompare(String(bv), "zh");
        return String(bv).localeCompare(String(av), "zh");
      });
    }

    function isEmptyInfo(v) {
      if (v === null || v === undefined) return true;
      const s = String(v).trim();
      if (!s) return true;
      const low = s.toLowerCase();
      if (low === "none" || low === "null" || low === "nan") return true;
      const parts = low.replace(/[,]/g, " ").split(/\s+/).filter(Boolean);
      return parts.length > 0 && parts.every(p => p === "none" || p === "null" || p === "nan");
    }

    async function autoEnrichMissingBuyerInfo(items) {
      if (autoEnrichRunning) return;
      if (!Array.isArray(items) || !items.length) return;
      const now = Date.now();
      if (now - lastAutoEnrichAt < 60 * 1000) return;
      const candidateIds = [];
      items.forEach((o) => {
        const oid = Number(o.id);
        if (!oid) return;
        const orderNo = String(getValue(o, { key: "订单编号", dataKey: "订单编号" }) || o.platform_order_no || "").trim();
        if (!orderNo) return;
        const addr = getValue(o, { key: "客户地址", dataKey: "客户地址" });
        const phone = getValue(o, { key: "电话", dataKey: "电话" });
        const missing = isEmptyInfo(addr) || isEmptyInfo(phone);
        if (!missing) return;
        const lastTry = autoEnrichTriedAt.get(oid) || 0;
        if (now - lastTry < 10 * 60 * 1000) return;
        candidateIds.push(oid);
      });
      if (!candidateIds.length) return;
      const ids = candidateIds.slice(0, 20);
      ids.forEach(id => autoEnrichTriedAt.set(id, now));
      autoEnrichRunning = true;
      lastAutoEnrichAt = now;
      try {
        const res = await fetch("/integrations/lingxing/enrich-fbm-addresses", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ order_ids: ids }),
        });
        const out = await res.json();
        if (res.ok && Number(out.updated || 0) > 0) {
          setTimeout(() => loadOrders(), 1200);
        }
      } catch (e) {
        console.warn("auto enrich failed", e);
      } finally {
        autoEnrichRunning = false;
      }
    }

      filterType.value = cur.type || "text";

      colFilterPop.style.top = `${rect.bottom + window.scrollY + 4}px`;

    function renderFilterBody(cur) {
      filterBody.innerHTML = "";
      if (filterType.value === "text") {
        filterBody.innerHTML = `<label>包含</label><input id="filterText" value="${cur.value || ""}" />`;
      } else if (filterType.value === "number") {
        filterBody.innerHTML = `<label>最小值</label><input id="filterMin" value="${cur.min || ""}" /><label>最大值</label><input id="filterMax" value="${cur.max || ""}" />`;
      } else if (filterType.value === "date") {
        filterBody.innerHTML = `<label>开始</label><input id="filterStart" value="${cur.start || ""}" placeholder="YYYY-MM-DD" /><label>结束</label><input id="filterEnd" value="${cur.end || ""}" placeholder="YYYY-MM-DD" />`;
      } else if (filterType.value === "status") {
        const key = colFilterPop.dataset.col;
        const rawVals = lastItems.map(o => {
          const v = String(getValue(o, { key }) || "");
          return v.replace(/\s+/g, " ").trim();
        });
        let list = Array.from(new Set(rawVals)).filter(v => v.length);
        if (!list.length) {
          list = ["待审核", "待发货", "已发货", "已取消", "部分发货"];
        }
        list = list.map(v => v.length ? v : "(空)");
        if (!list.includes("(空)")) list.unshift("(空)");
        const selected = cur.values || [];
        const box = document.createElement("div");
        if (!list.length) {
          box.innerHTML = `<div class='helper'>暂无可选值，可手动输入（逗号分隔）</div>
            <input id="statusManualInput" placeholder="例如：已发货,待审核" />`;
          filterBody.appendChild(box);
          return;
        }
        list.forEach(v => {
          const row = document.createElement("label");
          row.style.display = "flex";
          row.style.gap = "6px";
          const input = document.createElement("input");
          input.type = "checkbox";
          input.className = "status-check";
          input.value = v;
          if (selected.includes(v)) input.checked = true;
          row.appendChild(input);
          const text = document.createElement("span");
          text.textContent = v;
          row.appendChild(text);
          box.appendChild(row);
        });
        filterBody.appendChild(box);
      }
    }

        ids = (lastFilteredItems || [])
          .filter(o => {
            const s = String(getValue(o, { key: "订单状态", dataKey: "订单状态" }) || "").trim();
            return ["待审核", "Pending", "pending"].includes(s);
          })
          .map(o => Number(o.id))
          .filter(Boolean);
      }
      if (!ids.length) {
        alert("没有可刷新的待审核订单。可先勾选订单后再点刷新。");
        return;
      }
      const res = await fetch("/internal-orders/refresh-pending-status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order_ids: ids, only_pending: true }),
      });
      const out = await res.json();
      if (!res.ok || out.detail) {
        alert(`刷新待审核失败: ${JSON.stringify(out)}`);
        return;
      }
      alert(`刷新完成\n目标订单: ${out.total || 0}\n命中详情: ${out.detail_hits || 0}\n已更新: ${out.updated || 0}`);
      loadOrders();
    });
    document.getElementById("dedupeBtn").addEventListener("click", async () => {
      const selected = getSelectedOrderIds().filter(Boolean);
      const msg = selected.length
        ? `将清理勾选范围内的重复订单，勾选数: ${selected.length}。是否继续？`
        : "将清理全库重复订单（按订单号去重，保留信息更完整的一条）。是否继续？";
      if (!confirm(msg)) return;
      const res = await fetch("/internal-orders/deduplicate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ order_ids: selected }),
      });
      const out = await res.json();
      if (!res.ok || out.detail) {
        alert(`清理失败: ${JSON.stringify(out)}`);
        return;
      }
      alert(`清理完成\n重复组: ${out.groups || 0}\n删除重复: ${out.removed || 0}\n保留主记录: ${out.kept || 0}`);
      loadOrders();
    });
    viewSelect.addEventListener("change", () => {
      const idx = viewSelect.value;
      if (idx === "") return;
      const v = savedViews[Number(idx)];
      if (!v) return;
      document.getElementById("kw").value = v.kw || "";
      document.getElementById("startDate").value = v.start || "";
      document.getElementById("endDate").value = v.end || "";
      Object.keys(colFilters).forEach(k => delete colFilters[k]);
      Object.assign(colFilters, v.colFilters || {});
      activeSort = v.sort || null;
      localStorage.setItem("colFilters", JSON.stringify(colFilters));
      localStorage.setItem("activeSort", JSON.stringify(activeSort));
      loadOrders();
    });

    headerRow.addEventListener("change", (e) => {
      const target = e.target;
      if (target && target.id === "selectAll") {
        const checked = target.checked;
        document.querySelectorAll(".order-check").forEach(cb => { cb.checked = checked; });
      }
    });

    filterBtn.addEventListener("click", loadOrders);
    buildHeader();
    buildGroupBar();
    loadViews();
    loadOrders();

    // Auto sync Lingxing once per day to keep newest orders loaded.
    (async () => {
      const key = "autoLingxingSyncDay";
      const today = new Date().toISOString().slice(0, 10);
      if (localStorage.getItem(key) === today) return;
      localStorage.setItem(key, today);
      try {
        const res = await fetch("/integrations/lingxing/sync-fbm-orders", { method: "POST" });
        const out = await res.json();
        if (!res.ok || !out || !out.job_id) {
          localStorage.removeItem(key);
          console.warn("auto sync skipped", out);
          return;
        }
        setTimeout(() => { loadOrders(); }, 15000);
      } catch (e) {
        localStorage.removeItem(key);
        console.warn("auto sync failed", e);
      }
    })();

    // Auto backfill once per 6 hours
    (async () => {
      const last = Number(localStorage.getItem("autoBackfillAt") || "0");
      if (Date.now() - last < 6 * 60 * 60 * 1000) return;
      localStorage.setItem("autoBackfillAt", String(Date.now()));
      try {
        const res = await fetch("/internal-orders/backfill-detail", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ order_ids: [] }),
        });
        const out = await res.json();
        if (out.errors && out.errors.length) {
          console.warn("auto backfill errors", out.errors);
        }
        loadOrders();
      } catch (e) {}
    })();
  </script>
</body>
</html>
