<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>内部订单详情</title>
  <style>
    :root { --bg:#f4f6fb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --card:#fff; --accent:#2563eb; }
    body { margin:0; font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif; background:var(--bg); color:var(--ink); }
    .layout { display:grid; grid-template-columns:72px 1fr; min-height:100vh; }
    .sidebar { background:#111827; color:#cbd5e1; padding:12px 6px; display:flex; flex-direction:column; gap:10px; }
    .side-item { text-align:center; font-size:11px; padding:8px 6px; border-radius:10px; cursor:pointer; }
    .side-item.active { background:#1f2937; color:#fff; }
    .main { display:flex; flex-direction:column; min-width:0; }
    .topbar { background:#0b1220; color:#e5e7eb; padding:8px 16px; display:flex; gap:12px; align-items:center; }
    .tabs { background:#fff; border-bottom:1px solid var(--line); padding:8px 16px; display:flex; gap:8px; flex-wrap:wrap; }
    .tab { background:#f1f5f9; color:#111827; padding:6px 10px; border-radius:999px; font-size:12px; cursor:pointer; }
    .tab.active { background:#111827; color:#fff; }
    .content { padding:16px; }
    .title { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .title h1 { font-size:22px; font-weight:600; margin:0; }
    .sub { color:var(--muted); font-size:12px; }
    .btn { background:var(--accent); color:#fff; border:none; padding:8px 12px; border-radius:10px; cursor:pointer; font-size:12px; }
    .btn.outline { background:#fff; color:#111827; border:1px solid var(--line); }
    .grid-2 { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-top:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:0 8px 20px rgba(15,23,42,0.06); }
    .card h3 { margin:0 0 12px 0; font-size:16px; }
    .meta { display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:13px; }
    .meta .label { color:var(--muted); }
    .addr { font-size:13px; line-height:1.5; }
    table { width:100%; border-collapse:collapse; }
    th, td { padding:10px; border-bottom:1px solid var(--line); font-size:12px; }
    th { color:var(--muted); text-align:left; font-weight:600; }
    .img { width:48px; height:48px; border-radius:8px; object-fit:cover; background:#f1f5f9; }
    .pkg-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; font-size:12px; }
    .pill { background:#f1f5f9; padding:6px 10px; border-radius:999px; font-size:11px; display:inline-block; }
    .header-row { display:flex; align-items:center; gap:12px; }
    .header-row .order-id { font-weight:600; }
    .action-row { display:flex; gap:8px; flex-wrap:wrap; }
    .section-title { font-size:18px; font-weight:600; margin:0 0 10px 0; }
    .muted { color:var(--muted); }
    .status-pill { background:#22c55e; color:#fff; padding:2px 8px; border-radius:6px; font-size:11px; }
    .package-card { background:#f8fafc; border:1px solid var(--line); border-radius:12px; padding:12px; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="side-item" data-go="/ui/dashboard.html">首页</div>
      <div class="side-item active" data-go="/ui/internal_orders.html">订单</div>
      <div class="side-item" data-go="/ui/supplier_quote.html">报价</div>
      <div class="side-item" data-go="/ui/kapi_export.html">卡派</div>
      <div class="side-item" data-go="/ui/after_sales.html">售后</div>
      <div class="side-item" data-go="/ui/customer_service.html">客服</div>
      <div class="side-item" data-go="/ui/suppliers.html">供应商</div>
    </div>
    <div class="main">
      <div class="topbar">终极 ERP · 订单详情</div>
      <div class="tabs" id="tabs"></div>
      <div class="content">
        <div class="title">
          <div>
            <div class="header-row">
              <h1 style="margin:0;">订单详情</h1>
              <div class="sub" id="orderSub">订单号 -</div>
            </div>
          </div>
          <div class="action-row">
            <button class="btn outline" onclick="history.back()">返回订单列表</button>
            <button class="btn outline">打印装箱单</button>
            <button class="btn outline">订单退款</button>
            <button class="btn outline">请求评论</button>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>订单一览</h3>
            <div class="meta" id="orderMeta"></div>
          </div>
          <div class="card">
            <h3>配送地址</h3>
            <div class="addr" id="addrBox"></div>
          </div>
        </div>

        <div class="card" style="margin-top:16px;">
          <h3>订单内容</h3>
          <table>
            <thead>
              <tr>
                <th>状态</th>
                <th>图片</th>
                <th>商品名称</th>
                <th>更多信息</th>
                <th>数量</th>
                <th>商品单价</th>
                <th>收益</th>
              </tr>
            </thead>
            <tbody id="itemRows"></tbody>
          </table>
        </div>

        <div class="card" style="margin-top:16px;">
          <h3>包裹 1</h3>
          <div id="pkgRows" class="pkg-row"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="imgModal" style="position:fixed;inset:0;background:rgba(2,6,23,.72);display:none;align-items:center;justify-content:center;z-index:50;">
    <img id="imgModalSrc" src="" alt="preview" style="max-width:90vw;max-height:90vh;border-radius:12px;background:#fff;" />
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get("id");
    const metaEl = document.getElementById("orderMeta");
    const pkgRows = document.getElementById("pkgRows");
    const itemRows = document.getElementById("itemRows");
    const imgModal = document.getElementById("imgModal");
    const imgModalSrc = document.getElementById("imgModalSrc");
    const addrBox = document.getElementById("addrBox");
    const orderSub = document.getElementById("orderSub");
    const editAddrBtn = null;
    const quoteBtn = document.getElementById("quoteBtn");

    const tabsEl = document.getElementById("tabs");
    function openTab(label, url) {
      const tabs = JSON.parse(localStorage.getItem("tabs") || "[]");
      if (!tabs.find(t => t.url === url)) tabs.push({ label, url });
      localStorage.setItem("tabs", JSON.stringify(tabs));
      renderTabs(url);
    }
    function renderTabs(activeUrl) {
      const tabs = JSON.parse(localStorage.getItem("tabs") || "[]");
      if (!tabs.length) {
        tabs.push({ label: "订单", url: "/ui/internal_orders.html" });
        localStorage.setItem("tabs", JSON.stringify(tabs));
      }
      tabsEl.innerHTML = "";
      tabs.forEach(t => {
        const el = document.createElement("div");
        el.className = "tab" + (t.url === activeUrl ? " active" : "");
        el.textContent = t.label;
        el.onclick = () => location.href = t.url;
        tabsEl.appendChild(el);
      });
    }
    document.querySelectorAll(".side-item").forEach(el => {
      el.addEventListener("click", () => {
        const url = el.dataset.go;
        if (!url) return;
        openTab(el.textContent.trim(), url);
        location.href = url;
      });
    });
    renderTabs("/ui/internal_order_detail.html");

    function zoomImageUrl(url) {
      if (!url) return "";
      return String(url).replace(/_SL\\d+_\\.jpg/i, "_SL1000_.jpg");
    }

    async function loadDetail() {
      if (!orderId) return;
      const res = await fetch(`/internal-orders/${orderId}`);
      const data = await res.json();
      orderSub.textContent = `订单编号: # ${data.platform_order_no || "-"}  您的卖家订单编号: #`;
      const ext = data.ext || {};
      const fmtYmd = (v) => {
        const s = String(v || "").trim();
        if (!s || s === "None" || s === "null") return "-";
        return s.length >= 10 && s[4] === "-" && s[7] === "-" ? s.slice(0, 10) : s;
      };
      const shipDate = fmtYmd(ext["发货日"] || ext.amz_ship || "-");
      const deliverDate = String(ext["送达日"] || ext.amz_deliver || "-");
      const buyDate = ext["出单日期"] || ext.purchase_date_local || "-";
      metaEl.innerHTML = `
        <div><span class="label">发货日期</span><div>${shipDate}</div></div>
        <div><span class="label">配送服务</span><div>${ext["联邦方式"] || ext.fedex_method || "安排配送"}</div></div>
        <div><span class="label">送达日期</span><div>${deliverDate}</div></div>
        <div><span class="label">配送</span><div>卖家</div></div>
        <div><span class="label">购买日期</span><div>${buyDate}</div></div>
        <div><span class="label">销售渠道</span><div>Amazon.com</div></div>
      `;

      const clean = (v) => {
        if (v === null || v === undefined) return "";
        const s = String(v).trim();
        if (!s) return "";
        const low = s.toLowerCase();
        if (low === "none" || low === "null" || low === "nan") return "";
        return s;
      };
      const addrText = clean(ext["客户地址"]) || clean(ext.customer_address) || "";
      const addrLines = addrText ? addrText.split("\n").map(s => clean(s)).filter(Boolean) : [];
      const contactName = addrLines[0] || "";
      const addrRest = addrLines.slice(1);
      const contactPhone = clean(ext["电话"]) || clean(ext.receiver_mobile) || clean(ext.customer_phone) || "";
      addrBox.innerHTML = `
        <div>${contactName}</div>
        ${addrRest.map(x => `<div>${x}</div>`).join("")}
        <div>美国</div>
        ${contactPhone ? `<div>电话: ${contactPhone}</div>` : ""}
        <div class="sub">地址类型：住宅</div>
      `;

      itemRows.innerHTML = "";
      (data.items || []).forEach((i) => {
        const tr = document.createElement("tr");
        const status = data.order_status || "已发货";
        const productName = i.product_name || ext["产品名"] || "-";
        const sku = i.sku || ext["SKU"] || "-";
        const asin = ext["ASIN"] || ext.asin || "-";
        const price = ext["售价"] ? `US$${ext["售价"]}` : "-";
        tr.innerHTML = `
          <td><span class="status-pill">${status}</span></td>
          <td>${i.product_image && i.product_image !== "/" ? `<img class="img" src="${i.product_image}"/>` : "<div class='img' style='display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:10px;'>无图片</div>"}</td>
          <td>
            <div>${productName}</div>
            <div class="muted">ASIN: ${asin}</div>
            <div class="muted">SKU: ${sku}</div>
          </td>
          <td>
            <div class="muted">订单商品编号: ${ext["订单商品编号"] || "-"}</div>
          </td>
          <td>${i.quantity || ext["采购数量"] || "-"}</td>
          <td>${price}</td>
          <td>
            <div class="muted">商品小计: ${price}</div>
            <div class="muted">税务: -</div>
            <div class="muted">商品总计: -</div>
          </td>
        `;
        itemRows.appendChild(tr);
        const img = tr.querySelector("img.img");
        if (img) {
          img.style.cursor = "zoom-in";
          img.addEventListener("click", () => {
            const raw = img.getAttribute("src") || "";
            imgModalSrc.src = zoomImageUrl(raw) || raw;
            imgModal.style.display = "flex";
          });
        }
      });

      pkgRows.innerHTML = "";
      (data.packages || [{ }]).forEach((p, idx) => {
        const box = document.createElement("div");
        box.className = "package-card";
        const track = ext["联邦单号"] || data.tracking_no || "-";
        const carrier = ext["联邦方式"] || "FedEx";
        box.innerHTML = `
          <div><strong>发货日期</strong> ${ext["发货日"] || "-"}</div>
          <div><strong>承运人</strong> ${carrier}</div>
          <div><strong>配送服务</strong> ${ext["联邦方式"] || "-"}</div>
          <div><strong>追踪编码</strong> ${track}</div>
        `;
        pkgRows.appendChild(box);
      });
    }
    imgModal.addEventListener("click", () => { imgModal.style.display = "none"; });

    async function saveField(id, key, value) {
      await fetch(`/internal-orders/${id}/fields`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ [key]: value }),
      });
    }

    // 地址编辑已取消，等待接口自动填充

    if (quoteBtn) {
      quoteBtn.addEventListener("click", async () => {
        if (!orderId) return;
        const res = await fetch(`/internal-orders/${orderId}/quote-request`, { method: "POST" });
        const out = await res.json();
        alert(`报价单已创建: ${out.quote_no}`);
      });
    }

    loadDetail();
  </script>
</body>
</html>
