<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>供应商登录</title>
  <style>
    :root { --bg:#f4f6fb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --card:#fff; --accent:#2563eb; --dark:#0b1220; }
    body { margin:0; font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif; background:var(--bg); color:var(--ink); }
    .layout { display:grid; grid-template-columns:72px 1fr; min-height:100vh; }
    .sidebar { background:#111827; color:#cbd5e1; padding:12px 6px; display:flex; flex-direction:column; gap:10px; }
    .side-item { text-align:center; font-size:11px; padding:8px 6px; border-radius:10px; cursor:pointer; }
    .side-item.active { background:#1f2937; color:#fff; }
    .main { display:flex; flex-direction:column; min-width:0; }
    .topbar { background:#0b1220; color:#e5e7eb; padding:8px 16px; display:flex; gap:12px; align-items:center; }
    .tabs { background:#fff; border-bottom:1px solid var(--line); padding:8px 16px; display:flex; gap:8px; flex-wrap:wrap; }
    .tab { background:#f1f5f9; color:#111827; padding:6px 10px; border-radius:999px; font-size:12px; cursor:pointer; }
    .tab.active { background:#111827; color:#fff; }
    .content { padding:16px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:0 8px 20px rgba(15,23,42,0.06); max-width:520px; }
    .field { margin-top:12px; }
    .field label { display:block; color:var(--muted); font-size:12px; margin-bottom:6px; }
    input, select { width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:10px; }
    .btn { background:var(--accent); color:#fff; border:none; padding:8px 12px; border-radius:10px; cursor:pointer; font-size:12px; margin-top:12px; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <div class="side-item" data-go="/ui/dashboard.html">首页</div>
      <div class="side-item" data-go="/ui/internal_orders.html">订单</div>
      <div class="side-item active" data-go="/ui/supplier_login.html">登录</div>
      <div class="side-item" data-go="/ui/supplier_quote.html">报价</div>
      <div class="side-item" data-go="/ui/suppliers.html">供应商</div>
    </div>
    <div class="main">
      <div class="topbar">终极 ERP · 供应商登录</div>
      <div class="tabs" id="tabs"></div>
      <div class="content">
        <div class="card">
          <div>输入供应商账号密码登录。</div>
          <div class="field">
            <label>账号</label>
            <input id="username" autocomplete="username" placeholder="请输入供应商账号" />
          </div>
          <div class="field">
            <label>密码</label>
            <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
          </div>
          <button class="btn" id="loginBtn">登录</button>
          <button class="btn" id="adminBtn" style="background:#64748b;">管理员登录</button>
          <div id="msg" style="margin-top:8px;color:#b91c1c;font-size:12px;min-height:16px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tabsEl = document.getElementById("tabs");
    function openTab(label, url) {
      const tabs = JSON.parse(localStorage.getItem("tabs") || "[]");
      if (!tabs.find(t => t.url === url)) tabs.push({ label, url });
      localStorage.setItem("tabs", JSON.stringify(tabs));
      renderTabs(url);
    }
    function renderTabs(activeUrl) {
      const tabs = JSON.parse(localStorage.getItem("tabs") || "[]");
      if (!tabs.length) {
        tabs.push({ label: "登录", url: "/ui/supplier_login.html" });
        localStorage.setItem("tabs", JSON.stringify(tabs));
      }
      tabsEl.innerHTML = "";
      tabs.forEach(t => {
        const el = document.createElement("div");
        el.className = "tab" + (t.url === activeUrl ? " active" : "");
        el.textContent = t.label;
        el.onclick = () => location.href = t.url;
        tabsEl.appendChild(el);
      });
    }
    document.querySelectorAll(".side-item").forEach(el => {
      el.addEventListener("click", () => {
        const url = el.dataset.go;
        if (!url) return;
        openTab(el.textContent.trim(), url);
        location.href = url;
      });
    });
    renderTabs("/ui/supplier_login.html");

    (async function checkMe(){
      try{
        const r = await fetch("/auth/me", { credentials: "include" });
        if (!r.ok) return;
        const j = await r.json();
        if (j?.user?.role === "supplier") {
          localStorage.setItem("supplier_name", j.user.supplier_name || j.user.username || "");
          location.href = "/ui/supplier_quote.html";
        }
      }catch(_){}
    })();

    document.getElementById("loginBtn").addEventListener("click", () => {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");
      msg.textContent = "";
      if (!username || !password) {
        msg.textContent = "请输入账号和密码";
        return;
      }
      fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ username, password, role: "supplier" }),
      }).then(async (r) => {
        const j = await r.json().catch(() => ({}));
        if (!r.ok || !j.ok) {
          msg.textContent = `登录失败：${j.detail || r.status}`;
          return;
        }
        localStorage.setItem("supplier_name", j?.user?.supplier_name || j?.user?.username || "");
        location.href = "/ui/supplier_quote.html";
      }).catch((e) => {
        msg.textContent = `登录失败：${e?.message || e}`;
      });
    });

    document.getElementById("adminBtn").addEventListener("click", () => {
      location.href = "/ui/admin_login.html";
    });
  </script>
</body>
</html>
