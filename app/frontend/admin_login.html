<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理员登录</title>
  <style>
    :root { --bg:#f4f6fb; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --card:#fff; --accent:#2563eb; --dark:#0b1220; }
    body { margin:0; font-family:"SF Pro Text",-apple-system,BlinkMacSystemFont,"Noto Sans SC",sans-serif; background:var(--bg); color:var(--ink); }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:460px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; box-shadow:0 10px 30px rgba(15,23,42,0.08); }
    .title { font-size:22px; font-weight:700; margin:0 0 8px; }
    .sub { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .field { margin-top:12px; }
    .field label { display:block; color:var(--muted); font-size:12px; margin-bottom:6px; }
    input { width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; }
    .row { margin-top:14px; display:flex; gap:8px; align-items:center; }
    .btn { background:var(--accent); color:#fff; border:none; padding:9px 12px; border-radius:10px; cursor:pointer; font-size:13px; }
    .btn.gray { background:#64748b; }
    .msg { margin-top:10px; color:#b91c1c; font-size:12px; min-height:18px; white-space:pre-wrap; }
    a { color:#2563eb; text-decoration:none; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title">管理员登录</h1>
      <div class="sub">登录后进入内部订单与配置页面。</div>
      <div class="field">
        <label>账号</label>
        <input id="username" autocomplete="username" placeholder="请输入管理员账号" />
      </div>
      <div class="field">
        <label>密码</label>
        <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
      </div>
      <div class="row">
        <button class="btn" id="loginBtn">登录</button>
        <button class="btn gray" id="toSupplierBtn">供应商登录</button>
      </div>
      <div class="msg" id="msg"></div>
      <a href="/ui/index.html">返回入口</a>
    </div>
  </div>
  <script>
    async function checkMe() {
      try {
        const r = await fetch("/auth/me", { credentials: "include" });
        if (!r.ok) return;
        const j = await r.json();
        if (j?.user?.role === "admin") location.href = "/ui/internal_orders.html";
      } catch (_) {}
    }
    checkMe();

    document.getElementById("toSupplierBtn").onclick = () => { location.href = "/ui/supplier_login.html"; };
    document.getElementById("loginBtn").onclick = async () => {
      const msg = document.getElementById("msg");
      msg.textContent = "";
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) {
        msg.textContent = "请输入账号和密码";
        return;
      }
      try {
        const r = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ username, password, role: "admin" }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok || !j.ok) {
          msg.textContent = `登录失败：${j.detail || r.status}`;
          return;
        }
        location.href = "/ui/internal_orders.html";
      } catch (e) {
        msg.textContent = `登录失败：${e?.message || e}`;
      }
    };
  </script>
</body>
</html>
